spring:
  main:
    web-application-type: none
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
         dialect: org.hibernate.dialect.H2Dialect

mqtt:
  tcp-ports: [ 1893 ]
  ws-ports: []
  ssl-ports: []
  wss-ports: []
  session-expiry-hours: 1
  qos2-message-expiry-hours: 1
  hooks:
    auth-url: ""
    event-url: ""
    http-timeout-ms: 1000
  proxy-protocol: false
