# ==========================================================================
# QuickMQ 百万连接 Linux 内核参数调优
# 使用方法: sudo cp sysctl-tuning.conf /etc/sysctl.d/99-quickmq.conf && sudo sysctl -p /etc/sysctl.d/99-quickmq.conf
# ==========================================================================

# ---------- 文件描述符 ----------
# 系统级最大 fd 数（百万连接至少 1200000）
fs.file-max = 2000000
# inotify 限制（容器环境常需要）
fs.inotify.max_user_instances = 8192

# ---------- TCP 连接表 ----------
# 最大 TIME_WAIT bucket（回收前的连接池）
net.ipv4.tcp_max_tw_buckets = 1000000
# 开启 TIME_WAIT 快速回收
net.ipv4.tcp_tw_reuse = 1
# 半连接队列（SYN flood 防护 + 突发握手）
net.ipv4.tcp_max_syn_backlog = 65535
# 全连接队列上限
net.core.somaxconn = 65535
# 加速 FIN_WAIT 回收
net.ipv4.tcp_fin_timeout = 15

# ---------- TCP 缓冲区（百万连接关键！） ----------
# 每连接默认接收缓冲区：min=4KB pressure=4KB max=8KB
net.ipv4.tcp_rmem = 4096 4096 8192
# 每连接默认发送缓冲区：min=4KB pressure=4KB max=8KB
net.ipv4.tcp_wmem = 4096 4096 8192
# 全局 TCP 内存页限制（单位: 4KB 页），约 8GB
net.ipv4.tcp_mem = 786432 1048576 2097152
# 默认/最大 socket 缓冲
net.core.rmem_default = 4096
net.core.wmem_default = 4096
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608

# ---------- 网络栈杂项 ----------
# 接收队列长度
net.core.netdev_max_backlog = 65535
# 孤儿连接最大数
net.ipv4.tcp_max_orphans = 262144
# 本地端口范围
net.ipv4.ip_local_port_range = 1024 65535
# TCP keepalive（配合 Netty SO_KEEPALIVE）
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 3

# ---------- 内存 ----------
# 允许超量分配（避免 Netty DirectMemory mmap 被拒）
vm.overcommit_memory = 1
# 减少 swap 倾向
vm.swappiness = 10
