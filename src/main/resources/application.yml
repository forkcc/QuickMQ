spring:
  main:
    web-application-type: none

mqtt:
  # TCP 监听端口列表，留空则默认 [1883]
  tcp-ports: [ 1885, 1884 ]
  # WebSocket 监听端口列表，留空则不启 WebSocket
  ws-ports: [ 8083 ]
  # WebSocket 路径
  ws-path: /mqtt
  # 单条 MQTT 报文最大字节数（解码限制）
  max-message-size: 262144
  # WebSocket HTTP 聚合体最大 body 大小（字节）
  ws-max-http-body-size: 65536
  # CONNACK 默认 sessionPresent（无持久会话时一般为 false）
  default-session-present: false

  # ---------- Keepalive ----------
  # 客户端 CONNECT keepalive=0 时的服务端默认值（秒），0=不检测
  default-keepalive-seconds: 60
  # 服务端允许的最大 keepalive（秒），0=不限制
  max-keepalive-seconds: 0
  # TCP 连接后等待 CONNECT 报文的超时（秒），0=不限制（不推荐）
  connect-timeout-seconds: 10

  # ---------- Hooks ----------
  # 注册方式（优先级: HTTP URL > Spring Bean > 内置默认）
  hooks:
    # 认证 Webhook: CONNECT 时同步 POST JSON
    # 留空 = 放行所有连接（AllowAll），无需认证即可接入
    # 填写 URL 后，每次 CONNECT 同步调用该地址进行认证
    # 请求: {"clientId":"c1","username":"admin","password":"base64...","remoteAddress":"1.2.3.4","remotePort":54321,"protocolVersion":4,"cleanSession":true}
    # 响应: {"result":"allow"} 或 {"result":"deny","reason":"bad credentials"}
    auth-url: ""

    # 审计事件 Webhook: 异步 POST JSON（fire-and-forget）
    # 留空 = 不上报任何事件，零开销
    # 请求格式（action 字段标识事件类型）:
    #   连入:     {"action":"client_connected","clientId":"c1","remoteAddress":"1.2.3.4","remotePort":54321,"timestamp":1741484400000}
    #   断开:     {"action":"client_disconnected","clientId":"c1","remoteAddress":"1.2.3.4","remotePort":54321,"reason":"NORMAL","timestamp":...}
    #   发布:     {"action":"message_publish","clientId":"c1","topic":"sensor/temp","qos":1,"retain":false,"payloadSize":128,"timestamp":...}
    #   投递:     {"action":"message_delivered","clientId":"c1","topic":"sensor/temp","subscriberCount":3,"timestamp":...}
    #   订阅:     {"action":"client_subscribe","clientId":"c1","topicFilters":["sensor/#","cmd/+"],"timestamp":...}
    #   取消订阅: {"action":"client_unsubscribe","clientId":"c1","topicFilters":["sensor/#"],"timestamp":...}
    #   拒绝:     {"action":"connect_rejected","clientId":"c1","remoteAddress":"1.2.3.4","remotePort":54321,"reason":"bad credentials","timestamp":...}
    #   踢出:     {"action":"client_kicked","clientId":"c1","remoteAddress":"1.2.3.4","remotePort":54321,"timestamp":...}
    event-url: ""

    # HTTP 超时（毫秒）
    http-timeout-ms: 5000

  # ---------- Proxy Protocol ----------
  # 启用 HAProxy PROXY protocol v1/v2 以透传真实客户端 IP
  # 仅在 Broker 前有代理（HAProxy/Nginx 等）时开启
  proxy-protocol: false
